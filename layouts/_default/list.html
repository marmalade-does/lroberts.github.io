{{ define "main" }}
{{ if .Title }}<h1>{{ .Title }}</h1>{{ end }}

{{ .Content }}

{{ if eq .Section "blog" }}
<ul class="post-list">
    {{ range .Pages.ByDate.Reverse }}
    <li>
        <a href="{{ .RelPermalink }}">{{ .Title }}</a>
        <span class="post-date">- {{ .Date.Format "January 2, 2006" }}</span>
    </li>
    {{ end }}
</ul>
{{ end }}
{{ end }}
